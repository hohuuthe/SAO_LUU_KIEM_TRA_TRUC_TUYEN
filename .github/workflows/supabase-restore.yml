name: Phục hồi CSDL Supabase

on:
  workflow_dispatch:
    inputs:
      backup_file:
        description: 'Đường dẫn tới file backup (VD: backups/backup.sql.gz)'
        required: true
        type: string

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client 17
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Restore Supabase Database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          FILE_PATH="${{ github.event.inputs.backup_file }}"
          echo "Đang phục hồi từ file: $FILE_PATH"
          
          if [[ "$FILE_PATH" == *.gz ]]; then
            gunzip -c "$FILE_PATH" > temp_restore.sql
            psql "$SUPABASE_DB_URL" < temp_restore.sql
            rm temp_restore.sql
          else
            psql "$SUPABASE_DB_URL" < "$FILE_PATH"
          fi
          echo "Phục hồi hoàn tất."
