name: Sao lưu CSDL Supabase

on:
  schedule:
    - cron: '0 * * * *' # Giờ UTC
  workflow_dispatch: # Cho phép kích hoạt thủ công

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Bắt buộc để đẩy code lên repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client 17
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Backup Supabase Database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # Tạo thư mục backups nếu chưa tồn tại
          mkdir -p backups
          
          DATE=$(date +'%Y-%m-%d_%H-%M-%S')
          BACKUP_FILE="backups/backup-$DATE.sql"
          
          echo "Bắt đầu sao lưu..."
          /usr/lib/postgresql/17/bin/pg_dump "$SUPABASE_DB_URL" --clean --if-exists --quote-all-identifiers > $BACKUP_FILE
          gzip $BACKUP_FILE
          echo "Sao lưu hoàn tất."

      - name: Commit and Push Backup
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Xóa các bản sao lưu cũ hơn 30 ngày
          find backups/ -name "backup-*.sql*" -mtime +30 -type f -delete
          
          git add -A backups/
          git commit -m "chore: tự động sao lưu supabase $(date +'%Y-%m-%d')" || echo "Không có thay đổi nào để commit"
          git push
